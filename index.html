<!DOCTYPE html>
<html>
<head>
  <title>Novetus Hub</title>
</head>

<body>

<h1>Games</h1>

<div id="list"></div>

<script type="module">
import { supabase } from "js/supabase.js"

async function loadGames() {
  const { data } = await supabase
    .from("games")
    .select("*")
    .order("likes", { ascending: false })

  const list = document.getElementById("list")
  list.innerHTML = ""

  data.forEach(game => {
    const div = document.createElement("div")

    div.innerHTML = `
      <h2>${game.name}</h2>
      <p>${game.description}</p>
      <p>👍 ${game.likes} 👎 ${game.dislikes}</p>

      <button onclick="like('${game.id}')">Like</button>
      <button onclick="dislike('${game.id}')">Dislike</button>

      <button onclick="openGame('${game.id}')">Play</button>
      <hr>
    `

    list.appendChild(div)
  })
}

window.like = async (id) => {
  const { data } = await supabase
    .from("games")
    .select("likes")
    .eq("id", id)
    .single()

  await supabase
    .from("games")
    .update({ likes: data.likes + 1 })
    .eq("id", id)

  loadGames()
}

window.dislike = async (id) => {
  const { data } = await supabase
    .from("games")
    .select("dislikes")
    .eq("id", id)
    .single()

  await supabase
    .from("games")
    .update({ dislikes: data.dislikes + 1 })
    .eq("id", id)

  loadGames()
}

window.openGame = (id) => {
  window.location.href = "game.html?id=" + id
}

loadGames()
</script>

</body>
</html>
