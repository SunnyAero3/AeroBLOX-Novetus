<!DOCTYPE html>
<html>
<head>
  <title>Aeroblox Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="topbar">
  <div class="logo">AEROBLOX</div>

  <div class="nav">
    <button onclick="showTab('games')">Games</button>
    <button onclick="window.location.href='create.html'">Create New Game</button>
  </div>
</div>

<div class="container">

  <div id="gamesTab">
    <h2>Top Games</h2>
    <div id="games"></div>
  </div>

</div>

<script type="module" src="js/hub.js"></script>

<script>
function showTab(tab) {
  document.getElementById("gamesTab").style.display =
    tab === "games" ? "block" : "none"
}
</script>

</body>
</html>
